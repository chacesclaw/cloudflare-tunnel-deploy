server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE;
    root /var/www/html;

    index index.html index.htm;

    # 保持相对重定向，避免 HTTP/HTTPS 协议丢失
    absolute_redirect off;

    # 子路径示例
    # location /myapp/ {
    #     alias /var/www/html/myapp/;
    #     index index.html;
    # }
    # location = /myapp {
    #     return 301 /myapp/;
    # }

    location / {
        try_files $uri $uri/ =404;
    }
}
